name: Push to image repositories Github Action
on:
  workflow_call:
    inputs:
      lfs:
        description: Use Git LFS when checkout out files
        default: false
        type: boolean
      context:
        description: The path to the docker context in the repository
        required: false
        default: "."
        type: string
      file:
        description: The path to the Dockerfile in the repository
        required: false
        default: "./Dockerfile"
        type: string
      dependencyLocation:
        description: The location of the dependency in Google Cloud Storage
        required: true
        type: string
      dependencyDestination:
        description: The destination filename of the downloaded dependency
        required: true
        type: string
      ecrRepository:
        description: The ECR image repository to push to
        required: false
        default: ""
        type: string
      gcrRepository:
        description: The GCR image repository to push to
        required: false
        default: ""
        type: string
      aws_region:
        description: The region for the ECR repo
        required: false
        default: us-east-1
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        description: AWS key with push access to ECR
        required: false
      AWS_SECRET_ACCESS_KEY:
        description: AWS secret with push access to ECR
        required: false
      GCLOUD_SERVICE_ACCOUNT:
        description: Service account email with push access to GCR
        required: false
      GCLOUD_SERVICE_KEY:
        description: Service account JSON with push access to GCR
        required: false
      SLACK_NOTIFICATIONS_BOT_TOKEN:
        description: Bot token for Slack notifications
        required: true

jobs:
  build-and-push-to-gcr-with-dependency:
    runs-on: ubuntu-latest
    steps:
      - name: Notify slack started
        if: success()
        id: slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
        uses: zuplo/github-action-slack-notify-build@cf8e7e66a21d76a8125ea9648979c30920195552 # v2
        with:
          channel: github-actions
          status: STARTED
          color: warning
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          lfs: ${{ inputs.lfs }}
      - name: Get the ref name
        id: get_ref_name
        run: |
          if [ -n "$GITHUB_REF_NAME" ]
          then
              GITHUB_REF_TMP=${GITHUB_REF_NAME}
          else
              GITHUB_REF_TMP=${GITHUB_REF#refs/heads/}
              GITHUB_REF_TMP=${GITHUB_REF_TMP#refs/tags/}
          fi

          GITHUB_REF_CLEANED=${GITHUB_REF_TMP//\//-}
          echo "GIT_REF_NAME=${GITHUB_REF_TMP}" >> "$GITHUB_OUTPUT"
          echo "GIT_REF_DOCKER_TAG=${GITHUB_REF_CLEANED}" >> "$GITHUB_OUTPUT"
      # Google
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        if: "${{ inputs.gcrRepository != '' }}"
        with:
          service_account: "${{ secrets.GCLOUD_SERVICE_ACCOUNT }}"
          credentials_json: "${{ secrets.GCLOUD_SERVICE_KEY }}"
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
      - name: authenticate to GCR
        if: "${{ inputs.gcrRepository != '' }}"
        run: gcloud auth configure-docker
      # Amazon
      - name: Configure AWS credentials
        if: "${{ inputs.ecrRepository != '' }}"
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}
      - name: Login to Amazon ECR
        if: "${{ inputs.ecrRepository != '' }}"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
      - name: download dependency from S3
        run: |
          aws s3 cp ${{ inputs.dependencyLocation }} ${{ inputs.dependencyDestination }}
      # BEGIN BUILD
      - name: Build and push images to ECR
        if: "${{ inputs.ecrRepository != '' }}"
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: "${{ inputs.context }}"
          file: "${{ inputs.file }}"
          push: true
          tags: ${{ inputs.ecrRepository }}:${{ steps.get_ref_name.outputs.GIT_REF_DOCKER_TAG }}
      - name: Build and push images to GCR
        if: "${{ inputs.gcrRepository != '' }}"
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: "${{ inputs.context }}"
          file: "${{ inputs.file }}"
          push: true
          tags: ${{ inputs.gcrRepository }}:${{ steps.get_ref_name.outputs.GIT_REF_DOCKER_TAG }}
      # END BUILD
      - name: Notify slack success
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
        uses: zuplo/github-action-slack-notify-build@cf8e7e66a21d76a8125ea9648979c30920195552 # v2
        with:
          # Updates existing message from the first step
          message_id: ${{ steps.slack.outputs.message_id }}
          channel: github-actions
          status: SUCCESS
          color: good
      - name: Notify slack failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
        uses: zuplo/github-action-slack-notify-build@cf8e7e66a21d76a8125ea9648979c30920195552 # v2
        with:
          # Updates existing message from the first step
          message_id: ${{ steps.slack.outputs.message_id }}
          channel: github-actions
          status: FAILED
          color: danger
